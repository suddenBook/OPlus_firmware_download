name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Read app version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version_name="$(sed -nE 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' app/build.gradle.kts | head -n 1)"
          version_code="$(sed -nE 's/^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*([0-9]+).*/\1/p' app/build.gradle.kts | head -n 1)"
          if [[ -z "$version_name" || -z "$version_code" ]]; then
            echo "Failed to read versionCode/versionName from app/build.gradle.kts" >&2
            exit 1
          fi
          echo "name=$version_name" >> "$GITHUB_OUTPUT"
          echo "code=$version_code" >> "$GITHUB_OUTPUT"
          echo "tag=v$version_name" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        id: signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required repository secret: $name" >&2
              exit 1
            fi
          done
          keystore="$RUNNER_TEMP/release.keystore"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          echo "keystore=$keystore" >> "$GITHUB_OUTPUT"

      - name: Build unsigned release APK
        shell: bash
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Align, sign, and verify APK
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEYSTORE_PATH: ${{ steps.signing.outputs.keystore }}
        run: |
          set -euo pipefail
          build_tools_version="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -V | tail -n 1)"
          if [[ -z "$build_tools_version" ]]; then
            echo "No Android build-tools installation found" >&2
            exit 1
          fi
          build_tools="$ANDROID_HOME/build-tools/$build_tools_version"
          unsigned_apk="$(find app/build/outputs/apk/release -maxdepth 1 -name '*release-unsigned.apk' | head -n 1)"
          if [[ -z "$unsigned_apk" ]]; then
            echo "Unsigned release APK not found" >&2
            exit 1
          fi
          "$build_tools/zipalign" -p -f 4 "$unsigned_apk" "$RUNNER_TEMP/app-release-aligned.apk"
          "$build_tools/apksigner" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --key-pass env:ANDROID_KEY_PASSWORD \
            --out app-release.apk \
            "$RUNNER_TEMP/app-release-aligned.apk"
          "$build_tools/apksigner" verify --verbose --print-certs app-release.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-release.apk
          path: app-release.apk
          if-no-files-found: error

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          Automated release for ${{ steps.version.outputs.tag }}.

          - Version name: ${{ steps.version.outputs.name }}
          - Version code: ${{ steps.version.outputs.code }}
          - Commit: ${{ github.sha }}
          - APK: app-release.apk
          EOF

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --latest
            gh release upload "$TAG" app-release.apk --clobber
          else
            gh release create "$TAG" app-release.apk \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --latest
          fi
